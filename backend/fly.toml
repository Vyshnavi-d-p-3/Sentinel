# Sentinel Backend — Fly.io deployment
# Deploy: flyctl launch --config backend/fly.toml --dockerfile backend/Dockerfile
app = "sentinel-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  DB_AUTO_CREATE_TABLES = "false"
  LLM_MOCK_MODE = "false"
  EVAL_TRIGGER_ENABLED = "false"
  EVAL_TRIGGER_FORCE_MOCK = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/livez"
  timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
