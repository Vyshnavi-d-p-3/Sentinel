[alembic]
# Path is relative to this file (so ``alembic upgrade head`` works from
# anywhere inside ``backend/``).
script_location = migrations

# We don't auto-generate inside the ini — env.py wires the URL from
# ``app.config.settings`` so all environments use the same source of truth.
sqlalchemy.url =

# Format used to generate revision filenames. ``yyyy_mm_dd-HHMM_<slug>``
# keeps a clean chronological listing in version control.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
