name: Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm run test:e2e

      - name: Lighthouse (accessibility + performance, advisory)
        # Does not block merge — use reports to track scores toward the PDF goal (e.g. a11y ~90+).
        continue-on-error: true
        run: |
          npx --yes start-server-and-test@2.0.3 \
            "npm run start:ci" \
            "http://127.0.0.1:3005" \
            "npx -y lighthouse@12 http://127.0.0.1:3005/ --only-categories=accessibility,performance --preset=desktop --chrome-flags='--headless --no-sandbox' --quiet"
