name: Retrieval Ablation

on:
  push:
    branches: [main]
    paths:
      - "backend/app/services/**"
      - "backend/app/retrieval/**"
      - "backend/app/prompts/**"
      - "backend/app/models/review_output.py"
      - "eval/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/app/services/**"
      - "backend/app/retrieval/**"
      - "backend/app/prompts/**"
      - "backend/app/models/review_output.py"
      - "eval/**"
  workflow_dispatch:

# The ablation is an observational run — it never blocks merges, but it uploads
# a JSON artifact and prints a human-readable F1 delta table so reviewers can
# spot drift in how retrieval context changes the pipeline's outputs.

jobs:
  ablation:
    runs-on: ubuntu-latest
    env:
      LLM_MOCK_MODE: "true"
      DB_AUTO_CREATE_TABLES: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Validate fixture schema (incl. optional context_files)
        run: python eval/scripts/consistency_check.py --fixtures eval/fixtures

      - name: Run retrieval ablation
        run: |
          python eval/scripts/ablation.py \
            --fixtures eval/fixtures \
            --output eval/ablation_results.json

      - name: Upload ablation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ablation-results
          path: eval/ablation_results.json
